server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          # Auto-discovers services from Eureka
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          # Manual routes — explicit control
          routes:

            # ── User Service ──────────────────────
            - id: user-service
              uri: lb://user-service        # lb = load balanced via Eureka
              predicates:
                - Path=/api/v1/users/**
              filters:
                - StripPrefix=0

            # ── Inventory Service ─────────────────
            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/api/v1/inventory/**
              filters:
                - StripPrefix=0

            # ── Cylinder Types (Inventory Service) ─
            - id: cylinder-types
              uri: lb://inventory-service
              predicates:
                - Path=/api/v1/cylinder-types/**
              filters:
                - StripPrefix=0

            # ── Allocation Service ────────────────
            - id: allocation-service
              uri: lb://allocation-service
              predicates:
                - Path=/api/v1/allocations/**
              filters:
                - StripPrefix=0

            # ── Queue Service ─────────────────────
            - id: queue-service
              uri: lb://queue-service
              predicates:
                - Path=/api/v1/queue/**
              filters:
                - StripPrefix=0

            # ── Notification Service ─────────────
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/v1/notifications/**
              filters:
                - StripPrefix=0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Expose actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    gateway:
      enabled: true